services:

  backend:
    build:
      context: ./backend

    container_name: cafeteria-backend

    ports:
      - "3001:3001"

    env_file:
      - ./backend/.env

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: cafeteria-frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

    restart: unless-stopped